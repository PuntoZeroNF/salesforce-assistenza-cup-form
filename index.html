<!DOCTYPE html>
<html lang="it">
<head>
    <meta HTTP-EQUIV="Content-type" CONTENT="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- reCAPTCHA script -->
    <script src="https://www.google.com/recaptcha/api.js"></script>

    <script>
        // Timestamp richiesto da Salesforce
        function timestamp() { 
            var response = document.getElementById("g-recaptcha-response"); 
            if (response == null || response.value.trim() == "") { 
                var elems = JSON.parse(document.getElementsByName("captcha_settings")[0].value);
                elems["ts"] = JSON.stringify(new Date().getTime());
                document.getElementsByName("captcha_settings")[0].value = JSON.stringify(elems); 
            } 
        } 
        setInterval(timestamp, 500);

        // Validazione completa form
        function validateForm() {

            var recaptcha = grecaptcha.getResponse();
            var errorDiv = document.getElementById("recaptcha-error");

            if (recaptcha.length === 0) {
                errorDiv.style.display = "block";
                return false; // blocca submit
            }

            errorDiv.style.display = "none";
            return true; // consente submit
        }
    </script>

    <title>Richiesta Assistenza NUS - PuntoZero</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #003087;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.2em;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #003087;
            margin-bottom: 8px;
            font-size: 1em;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #003087;
            box-shadow: 0 0 0 3px rgba(0,48,135,0.1);
        }

        textarea { resize: vertical; min-height: 120px; }

        .row {
            display: flex;
            gap: 20px;
        }

        .row > div {
            flex: 1;
        }

        .submit-btn {
            background: linear-gradient(135deg, #003087 0%, #0056b3 100%);
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,48,135,0.3);
        }

        .footer {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            padding: 20px;
        }

        .recaptcha-error {
			color: #d93025;
			font-size: 1em;
			font-weight: 700; /* grassetto */
			margin-top: 15px; /* più spazio sopra */
			margin-bottom: 20px;
			display: none;
		}
		
		.g-recaptcha {
			margin-top: 10px;
		}

        @media (max-width: 768px) {
            .row { flex-direction: column; gap: 0; }
            .container { padding: 20px 15px; }
            .form-section { padding: 30px 20px; }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>🩺 Assistenza su prenotazioni CUP</h1>
            <p>Compila il modulo per inviare la tua richiesta di assistenza.</p>
        </div>

        <div class="form-section">
            <form action="https://puntozero--ccinfotest.sandbox.my.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DMA000001wuu5" 
                  method="POST" 
                  onsubmit="return validateForm()">

                <!-- Hidden fields -->
                <input type="hidden" name="captcha_settings"
                       value='{"keyname":"PuntoZero_DEV_Localhost_WebToCase","fallback":"true","orgId":"00DMA000001wuu5","ts":""}'>

                <input type="hidden" name="orgid" value="00DMA000001wuu5">
                <input type="hidden" name="retURL" value="https://assistenza.puntozeroscarl.it/s/">

                <div class="row">
                    <div>
                        <label for="nome">Nome <span style="color:red;">*</span></label>
                        <input id="nome" maxlength="20" name="00N0900000NR5QI" type="text" required>
                    </div>
                    <div>
                        <label for="cognome">Cognome <span style="color:red;">*</span></label>
                        <input id="cognome" maxlength="20" name="00N0900000NR5Pj" type="text" required>
                    </div>
                </div>

                <label for="phone">Telefono <span style="color:red;">*</span></label>
                <input id="phone" name="phone" type="tel" pattern="[0-9]+" inputmode="numeric" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email">

                <label for="cf">Codice Fiscale <span style="color:red;">*</span></label>
                <input id="cf" name="00N0900000NR5Pe" maxlength="20" type="text" required>

                <label for="nre">Numero Ricetta Elettronica (NRE) <span style="color:red;">*</span></label>
                <input id="nre" name="00NMA000004GuGr" maxlength="15" type="text" required>

                <label for="description">Descrizione del problema <span style="color:red;">*</span></label>
                <textarea id="description" name="description" required
                    placeholder="Descrivi dettagliatamente il problema che stai riscontrando..."></textarea>

                <div class="g-recaptcha"
                     data-sitekey="6LeOtW8sAAAAALB7lkqfLtG7769RMuDgfWzOqQRv"></div>

                <div id="recaptcha-error" class="recaptcha-error">
                    ⚠️ Per favore completa il controllo di sicurezza reCAPTCHA.
                </div>

                <button type="submit" class="submit-btn">
                    📋 Invia Richiesta
                </button>

            </form>
        </div>

        <div class="footer">
            <p>© 2026 PuntoZero S.C.A.R.L. | La nuova versione dell'innovazione |
                <a href="https://puntozeroscarl.it/" style="color:#003087;">
                    Torna alla home
                </a>
            </p>
        </div>

    </div>
</body>
</html>
